<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Situs B - Target Korban</title>
    <style>
        body {
            background-color: #ffebee;
            font-family: sans-serif;
            padding: 50px;
            text-align: center;
        }

        #dropZone {
            border: 4px dashed #d32f2f;
            padding: 80px 20px;
            background: white;
            margin-top: 30px;
            font-size: 20px;
            font-weight: bold;
            color: #d32f2f;
        }

        #log {
            margin-top: 20px;
            text-align: left;
            background: #222;
            color: #0f0;
            padding: 15px;
            font-family: monospace;
            min-height: 50px;
        }
    </style>
</head>

<body>
    <h2>Situs B (Domain Berbeda - Tanpa Sandbox)</h2>
    <p>Ini adalah halaman web normal yang memiliki izin penuh.</p>

    <div id="dropZone">
        JATUHKAN KOTAK BIRU DARI SITUS A KE SINI
    </div>

    <div id="log">Menunggu aktivitas drop...<br></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const logDiv = document.getElementById('log');

        function log(msg) {
            logDiv.innerHTML += msg + "<br>";
            console.log(msg);
        }

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = "#ffcdd2";
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.backgroundColor = "white";
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = "white";
            log("--- DROP TERDETEKSI DARI LUAR ---");
            const leakedText = e.dataTransfer.getData("text/plain");
            const leakedDownload = e.dataTransfer.getData("DownloadURL");

            if (leakedDownload) {
                log("<span style='color:red'>BAHAYA (SOP BYPASS)! Situs B berhasil membaca DownloadURL:</span> " + leakedDownload);
            } else if (leakedText) {
                log("<span style='color:red'>BAHAYA (SOP BYPASS)! Situs B berhasil membaca teks:</span> " + leakedText);
            } else {
                log("Aman. Browser memblokir pembacaan data lintas-origin.");
            }
        });
    </script>
</body>

</html>
