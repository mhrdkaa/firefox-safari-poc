<!DOCTYPE html>
<html>

<head>
    <title>PoC - Site B (Fullscreen)</title>
    <style>
        body {
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: white;
        }

        #timer {
            font-size: 3rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="timer">2s...</div>
    <div id="status">Tahan "Enter" lalu lepas di 1s</div>

    <script>
        setTimeout(() => { document.getElementById('timer').innerText = "1s..."; }, 1000);
        setTimeout(() => { document.getElementById('timer').innerText = "LEPAS!"; }, 2000);
        window.addEventListener('keyup', (e) => {
            if (e.key === 'Enter' && navigator.userActivation.isActive) {
                window.open("https://example.com", "_blank");
            }
        });
    </script>
</body>

</html>
